<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OnboardAI</title>
  </head>
  <body>
    <script>
      (function () {
        var base = "/onboard-ai";
        var path = window.location.pathname;
        var route = path.indexOf(base) === 0 ? path.slice(base.length) : path;
        if (!route || route === "/") route = "/";
        window.location.replace(base + "/#" + route + window.location.search);
      })();
    </script>
  </body>
</html>
